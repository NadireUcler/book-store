<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Group 3 Store Hub</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="page-wrapper">
  <div class="hero">
    <h1>Group 3 Store Hub</h1>
    <p>View products from Nadire, Joe, and Hamzah stores</p>

    <div class="hero-actions">
      <button class="main-button" onclick="loadGroupStores()">Load Products</button>
    </div>
  </div>

  <div class="stores-stack">
    <div class="store-panel nadire-store">
      <h3>🛍️ Nadire's Book Store</h3>
      <ul id="nadireList"><li>No products</li></ul>
    </div>

    <div class="store-panel joe-store">
      <h3>🖥️ Joe's Store</h3>
      <ul id="joeList"><li>No products</li></ul>
    </div>

    <div class="store-panel hamzah-store">
      <h3>📦 Hamzah's Store</h3>
      <ul id="hamzahList"><li>No products</li></ul>
    </div>
  </div>
</div>

<script>
function fillStoreList(id, data) {
  const list = document.getElementById(id);
  list.innerHTML = "";

  if (!data.length) {
    list.innerHTML = "<li>No products found</li>";
    return;
  }

  data.forEach(p => {
    const li = document.createElement("li");
    li.textContent = `${p.productName} - $${p.price}`;
    list.appendChild(li);
  });
}

async function loadGroupStores() {
  const res = await fetch("/all-products");
  const data = await res.json();

  fillStoreList("nadireList", data.filter(p => p.storeId === 2));
  fillStoreList("joeList", data.filter(p => p.storeId === 1));
  fillStoreList("hamzahList", data.filter(p => p.storeId === 3));
}

loadGroupStores();
</script>

</body>
</html>
